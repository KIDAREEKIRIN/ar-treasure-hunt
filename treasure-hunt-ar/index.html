<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>보물 탐험 AR (월드 트래킹)</title>

  <!-- 8th Wall A-Frame 포크(8frame): xrweb 월드트래킹 컴포넌트 포함. LFS에서 받아 벤더링. -->
  <script src="./vendor/8frame-1.5.0.min.js"></script>
  <!-- 로딩/에러/유틸 UI -->
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/xrextras@1/dist/xrextras.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/landing-page@1/dist/landing-page.js" crossorigin="anonymous"></script>
  <!-- 무료 배포 엔진 바이너리 (SLAM) -->
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js" crossorigin="anonymous" async="true" data-preload-chunks="slam"></script>

  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, system-ui, sans-serif; }

    #hud { position: fixed; top: 12px; left: 50%; transform: translateX(-50%); z-index: 10;
      display: flex; gap: 7px; align-items: center; flex-wrap: wrap; justify-content: center; max-width: 96vw; }
    .pill { background: rgba(0,0,0,.62); color: #fff; padding: 7px 12px; border-radius: 12px;
      font-size: 13px; font-variant-numeric: tabular-nums; white-space: nowrap; }
    .pill b { color: #FFD54F; font-size: 16px; }
    .pill.danger b { color: #FF5252; }
    #combo.hot { color: #FF8A65; }
    #timer.low { color: #FF5252; }

    #prompt { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); z-index: 10;
      background: rgba(0,0,0,.66); color: #fff; padding: 10px 16px; border-radius: 14px; font-size: 15px;
      text-align: center; max-width: 86vw; }

    #radar { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 10;
      display: flex; flex-direction: column; align-items: center; gap: 5px; pointer-events: none; opacity: 0; transition: opacity .2s; }
    #arrow { width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent;
      border-bottom: 36px solid #FFD54F; transition: transform .12s linear, filter .2s;
      filter: drop-shadow(0 0 6px rgba(255,213,79,.6)); }
    #radarLabel { background: rgba(0,0,0,.6); color: #fff; font-size: 12px; padding: 4px 10px; border-radius: 10px; }

    #toast { position: fixed; top: 44%; left: 50%; transform: translate(-50%,-50%); z-index: 12;
      font-size: 30px; font-weight: 800; opacity: 0; text-shadow: 0 2px 12px rgba(0,0,0,.6);
      pointer-events: none; color: #FFD54F; text-align: center; }
    #toast.bad { color: #FF5252; }
    #toast.show { animation: pop .7s ease-out; }
    @keyframes pop { 0%{opacity:0;transform:translate(-50%,-50%) scale(.5)} 25%{opacity:1;transform:translate(-50%,-58%) scale(1.1)} 100%{opacity:0;transform:translate(-50%,-80%) scale(1)} }

    #end { position: fixed; inset: 0; z-index: 30; display: none; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px; text-align: center; color: #fff;
      background: rgba(8,8,20,.86); padding: 24px; }
    #end h1 { font-size: 27px; margin: 0; }
    #end .stat { font-size: 20px; } #end .stat b { color: #FFD54F; }
    .btn { border: none; border-radius: 16px; padding: 14px 28px; font-size: 17px; font-weight: 700;
      color: #1a237e; background: #FFD54F; cursor: pointer; }
  </style>

  <script>
    // ====== 설정 (월드 단위: 8frame 예제 스케일 기준, 약 6단위 ≈ 1m) ======
    const CONFIG = {
      treasureCount: 6,
      mineCount: 2,
      timeSec: 90,
      fieldRMin: 12, fieldRMax: 45,    // 탭 지점 주변 보물 분포 반경(단위)
      yMin: 0, yMax: 14,               // 바닥~약 2.3m
      modelUnits: 7,                   // 모델 목표 크기(단위)
      colliderR: 5,                    // 조준용 충돌 구체 반경
      comboWindowMs: 3000,
      fakePenaltySec: 5,
    };
    const T_CDN = 'https://cdn.jsdelivr.net/gh/mrdoob/three.js@r155/examples/models/gltf/';
    const TYPES = [
      { key:'common', points:1, weight:60, tint:'#FFD54F', glow:null,      aura:null,      sizeMul:1.0,  models:['models/common.glb', T_CDN+'Parrot.glb'] },
      { key:'rare',   points:3, weight:30, tint:'#29B6F6', glow:'#29B6F6', aura:'#29B6F6', sizeMul:1.15, models:['models/rare.glb',   T_CDN+'Flamingo.glb'] },
      { key:'epic',   points:5, weight:10, tint:'#AB47BC', glow:'#AB47BC', aura:'#AB47BC', sizeMul:1.3,  models:['models/epic.glb',   T_CDN+'Horse.glb'] },
    ];
    const TW = TYPES.reduce((s,t)=>s+t.weight,0);
    function pickType(){ let r=Math.random()*TW; for(const t of TYPES){ if((r-=t.weight)<0) return t; } return TYPES[0]; }

    let audioCtx = null;
    function audio(){ if(!audioCtx){ try{ audioCtx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return audioCtx; }
    function tone(f,start,dur,type,vol){ const c=audio(); if(!c) return; const o=c.createOscillator(),g=c.createGain();
      o.type=type; o.frequency.value=f; o.connect(g); g.connect(c.destination);
      g.gain.setValueAtTime(vol,start); g.gain.exponentialRampToValueAtTime(0.0008,start+dur); o.start(start); o.stop(start+dur+0.02); }
    function collectSound(combo){ const c=audio(); if(!c) return; const base=620+Math.min(combo,10)*70,t=c.currentTime;
      [0,0.07,0.14].forEach((dt,i)=>tone(base*(1+i*0.26),t+dt,0.13,'triangle',0.16)); }
    function fakeSound(){ const c=audio(); if(!c) return; const dur=0.35,n=Math.floor(c.sampleRate*dur);
      const buf=c.createBuffer(1,n,c.sampleRate),d=buf.getChannelData(0);
      for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/n,2);
      const s=c.createBufferSource(); s.buffer=buf; const lp=c.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=900;
      const g=c.createGain(); g.gain.value=0.35; s.connect(lp); lp.connect(g); g.connect(c.destination); s.start();
      tone(110,c.currentTime,0.3,'sawtooth',0.2); }
    function jingle(win){ const c=audio(); if(!c) return; const t=c.currentTime, n=win?[523,659,784,1046]:[440,330,247,175];
      n.forEach((f,i)=>tone(f,t+i*0.14,0.25,win?'triangle':'sawtooth',0.16)); }
    function showToast(text,bad){ const t=document.getElementById('toast'); t.textContent=text;
      t.classList.toggle('bad',!!bad); t.classList.remove('show'); void t.offsetWidth; t.classList.add('show'); }

    // 모델 헬퍼
    function applyGem(el,color){ el.removeAttribute('gltf-model');
      el.setAttribute('geometry','primitive: dodecahedron; radius: '+(CONFIG.modelUnits*0.5));
      el.setAttribute('material',`color:${color}; emissive:${color}; emissiveIntensity:0.55; metalness:0.4; roughness:0.3`); }
    function autoFit(el,mul){ const THREE=AFRAME.THREE,obj=el.object3D; obj.scale.set(1,1,1); obj.position.set(0,0,0);
      const box=new THREE.Box3().setFromObject(obj); if(!isFinite(box.min.x)) return;
      const size=new THREE.Vector3(); box.getSize(size); const center=new THREE.Vector3(); box.getCenter(center);
      const s=(CONFIG.modelUnits*(mul||1))/(Math.max(size.x,size.y,size.z)||1);
      obj.scale.setScalar(s); obj.position.set(-center.x*s,-center.y*s,-center.z*s); }
    function tintModel(el,color){ const THREE=AFRAME.THREE; el.object3D.traverse(o=>{ if(o.isMesh&&o.material){
      o.material=o.material.clone(); o.material.emissive=new THREE.Color(color); o.material.emissiveIntensity=0.7; } }); }
    function loadModelChain(el,models,glow,sizeMul,fallback){ let i=0;
      el.addEventListener('model-loaded',()=>{ autoFit(el,sizeMul); if(glow) tintModel(el,glow); });
      el.addEventListener('model-error',()=>{ i++; if(i<models.length) el.setAttribute('gltf-model',models[i]); else applyGem(el,fallback); });
      el.setAttribute('gltf-model',models[0]); }

    // ====== 게임 컴포넌트 ======
    window.addEventListener('DOMContentLoaded', () => {
      AFRAME.registerComponent('ar-treasure-game', {
        init() {
          this.THREE = AFRAME.THREE;
          this.placed = false; this.started = false; this.treasures = [];
          this.fwd = new this.THREE.Vector3(); this.right = new this.THREE.Vector3();
          this.up = new this.THREE.Vector3(0,1,0); this.camPos = new this.THREE.Vector3();
          this.tmp = new this.THREE.Vector3();
          this.camEl = document.getElementById('camera');
          this.field = document.getElementById('field');

          // 바닥 탭 → 첫 탭이면 보물 필드 생성
          document.getElementById('ground').addEventListener('click', (e) => {
            audio(); // 사용자 제스처에서 오디오 활성화
            if (this.placed) return;
            this.placeField(e.detail.intersection.point);
          });
        },

        placeField(center) {
          this.placed = true;
          document.getElementById('prompt').textContent = '보물을 향해 걸어가 탭하세요! 🟥 지뢰 주의';
          const flags = [];
          for (let i=0;i<CONFIG.treasureCount;i++) flags.push(false);
          for (let i=0;i<CONFIG.mineCount;i++) flags.push(true);
          for (let i=flags.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [flags[i],flags[j]]=[flags[j],flags[i]]; }
          flags.forEach((isFake)=> this.makeOne(center, isFake));

          this.needed = CONFIG.treasureCount; this.collected = 0; this.score = 0;
          this.combo = 0; this.lastCollect = 0;
          this.deadline = performance.now() + CONFIG.timeSec*1000;
          this.started = true;
          document.getElementById('remaining').textContent = this.needed;
        },

        makeOne(center, isFake) {
          const ang = Math.random()*Math.PI*2;
          const r = CONFIG.fieldRMin + Math.random()*(CONFIG.fieldRMax-CONFIG.fieldRMin);
          const x = center.x + Math.sin(ang)*r;
          const z = center.z + Math.cos(ang)*r;
          const y = (center.y||0) + CONFIG.yMin + Math.random()*(CONFIG.yMax-CONFIG.yMin);
          const type = isFake ? null : pickType();

          const hit = document.createElement('a-entity');
          hit.classList.add('treasure');
          hit.setAttribute('position', `${x} ${y} ${z}`);
          hit.setAttribute('geometry', 'primitive: sphere; radius: '+CONFIG.colliderR);
          hit.setAttribute('material', 'opacity: 0; transparent: true');
          hit.setAttribute('animation__bob', `property: position; to: ${x} ${y+2} ${z}; dir: alternate; loop: true; dur: 1500; easing: easeInOutSine`);

          const vis = document.createElement('a-entity');
          vis.setAttribute('animation__spin', 'property: rotation; to: 0 360 0; loop: true; dur: 4000; easing: linear');
          if (isFake) {
            vis.setAttribute('geometry', 'primitive: icosahedron; radius: '+(CONFIG.modelUnits*0.5));
            vis.setAttribute('material', 'color:#2b2b2b; emissive:#ff1744; emissiveIntensity:0.7; metalness:0.2; roughness:0.5');
            vis.setAttribute('animation__warn', 'property: material.emissiveIntensity; from:0.25; to:1; dir:alternate; loop:true; dur:500');
          } else {
            loadModelChain(vis, type.models, type.glow, type.sizeMul, type.tint);
            if (type.aura) {
              const ring = document.createElement('a-ring');
              ring.setAttribute('radius-inner', CONFIG.modelUnits*0.55); ring.setAttribute('radius-outer', CONFIG.modelUnits*0.7);
              ring.setAttribute('rotation', '-90 0 0');
              ring.setAttribute('material', `color:${type.aura}; emissive:${type.aura}; emissiveIntensity:0.8; side:double; shader:flat`);
              ring.setAttribute('animation__pulse', 'property: scale; to: 1.18 1.18 1.18; dir:alternate; loop:true; dur:900');
              hit.appendChild(ring);
            }
          }
          hit.appendChild(vis);

          const data = { el: hit, pos: new this.THREE.Vector3(x,y,z), collected:false, isFake, type };
          hit.addEventListener('click', () => this.collect(data));
          this.field.appendChild(hit);
          this.treasures.push(data);
        },

        spawnBurst(pos, color) {
          const b = document.createElement('a-entity');
          b.setAttribute('position', `${pos.x} ${pos.y} ${pos.z}`);
          for (let i=0;i<10;i++){
            const p = document.createElement('a-sphere');
            p.setAttribute('radius', CONFIG.modelUnits*0.12);
            p.setAttribute('material', `color:${color}; emissive:${color}; emissiveIntensity:1; shader:flat`);
            const dx=(Math.random()-0.5)*CONFIG.modelUnits*3, dy=(Math.random()-0.5)*CONFIG.modelUnits*3+CONFIG.modelUnits, dz=(Math.random()-0.5)*CONFIG.modelUnits*3;
            p.setAttribute('animation__m', `property: position; to: ${dx} ${dy} ${dz}; dur: 600; easing: easeOutQuad`);
            p.setAttribute('animation__f', `property: scale; from: 1 1 1; to: 0 0 0; dur: 600; easing: easeInQuad`);
            b.appendChild(p);
          }
          this.field.appendChild(b);
          setTimeout(()=> b.parentNode && b.parentNode.removeChild(b), 660);
        },

        collect(data) {
          if (data.collected || !this.started) return;
          data.collected = true;
          data.el.setAttribute('animation__c', 'property: scale; to: 0 0 0; dur: 240; easing: easeInBack');
          setTimeout(()=> data.el.parentNode && data.el.parentNode.removeChild(data.el), 260);

          if (data.isFake) {
            fakeSound(); this.spawnBurst(data.pos, '#FF1744');
            this.deadline -= CONFIG.fakePenaltySec*1000; this.score = Math.max(0,this.score-1);
            this.combo = 0; this.updateCombo();
            showToast('💥 -'+CONFIG.fakePenaltySec+'s', true);
          } else {
            const now = performance.now();
            this.combo = (now - this.lastCollect <= CONFIG.comboWindowMs) ? this.combo+1 : 1;
            this.lastCollect = now;
            const gained = data.type.points * this.combo;
            this.score += gained; this.collected++;
            collectSound(this.combo); this.spawnBurst(data.pos, data.type.tint);
            this.updateCombo();
            showToast(this.combo>=2 ? `+${gained}  x${this.combo}🔥` : `+${gained}`, false);
            document.getElementById('remaining').textContent = this.needed - this.collected;
            if (this.collected >= this.needed) return this.end(true);
          }
          document.getElementById('score').textContent = this.score;
        },

        updateCombo() {
          const el = document.getElementById('combo');
          el.textContent = this.combo>=1 ? ('x'+this.combo) : '—';
          el.classList.toggle('hot', this.combo>=3);
        },

        end(win) {
          this.started = false; jingle(win);
          const sec = Math.max(0,(this.deadline-performance.now())/1000).toFixed(1);
          document.getElementById('endTitle').textContent = win ? '🎉 클리어!' : '⏰ 시간 종료';
          document.getElementById('endStat').innerHTML = win
            ? `남은 시간 <b>${sec}</b>초 · 점수 <b>${this.score}</b>`
            : `획득 <b>${this.collected}/${this.needed}</b> · 점수 <b>${this.score}</b>`;
          document.getElementById('end').style.display = 'flex';
          document.getElementById('radar').style.opacity = 0;
        },

        tick() {
          if (!this.started) return;
          const now = performance.now();
          if (this.combo>0 && now-this.lastCollect>CONFIG.comboWindowMs) { this.combo=0; this.updateCombo(); }

          const left = (this.deadline-now)/1000;
          const tEl = document.getElementById('timer');
          tEl.textContent = Math.max(0,left).toFixed(1);
          tEl.classList.toggle('low', left<=10);
          if (left<=0) return this.end(false);

          // 카메라 월드 위치/방향 기준 레이더 (걸어다니므로 상대 벡터 사용)
          const cam = this.camEl.object3D;
          cam.getWorldPosition(this.camPos);
          cam.getWorldDirection(this.fwd); this.fwd.y=0;
          if (this.fwd.lengthSq()<1e-6) return; this.fwd.normalize();
          this.right.crossVectors(this.fwd, this.up).normalize();

          let bestAng=null, bestAbs=999, bestY=0;
          for (const t of this.treasures) {
            if (t.collected || t.isFake) continue;
            this.tmp.copy(t.pos).sub(this.camPos);
            const dy = this.tmp.y; this.tmp.y=0;
            if (this.tmp.lengthSq()<1e-6) continue; this.tmp.normalize();
            const ang = Math.atan2(this.tmp.dot(this.right), this.tmp.dot(this.fwd))*180/Math.PI;
            if (Math.abs(ang)<bestAbs){ bestAbs=Math.abs(ang); bestAng=ang; bestY=dy; }
          }
          const radar = document.getElementById('radar'), arrow=document.getElementById('arrow'), label=document.getElementById('radarLabel');
          if (bestAng===null){ radar.style.opacity=0; return; }
          radar.style.opacity=1; arrow.style.transform=`rotate(${bestAng}deg)`;
          const on = bestAbs<14;
          arrow.style.filter = on ? 'drop-shadow(0 0 14px rgba(255,213,79,1))' : 'drop-shadow(0 0 6px rgba(255,213,79,.6))';
          const vh = bestY>3 ? ' · 위 ▲' : (bestY<-3 ? ' · 아래 ▼' : '');
          label.textContent = (on ? '가까이! 탭하세요' : '이 방향으로') + vh;
        }
      });
    });
  </script>
</head>
<body>
  <div id="hud">
    <div class="pill">🏆 <b id="score">0</b></div>
    <div class="pill">🔥 <b id="combo">—</b></div>
    <div class="pill">💎 <b id="remaining">0</b></div>
    <div class="pill danger">⏱️ <b id="timer">0.0</b>s</div>
  </div>
  <div id="prompt">바닥을 비추고 <b>탭</b>하면 보물이 나타납니다</div>
  <div id="radar"><div id="arrow"></div><div id="radarLabel">이 방향으로</div></div>
  <div id="toast">+1</div>
  <div id="end">
    <h1 id="endTitle">🎉 클리어!</h1>
    <div class="stat" id="endStat"></div>
    <button class="btn" onclick="location.reload()">다시 하기</button>
  </div>

  <a-scene
    ar-treasure-game
    landing-page
    xrextras-loading
    xrextras-runtime-error
    renderer="colorManagement: true"
    xrweb="allowedDevices: any">

    <a-camera
      id="camera"
      position="0 8 0"
      raycaster="objects: .cantap, .treasure"
      cursor="fuse: false; rayOrigin: mouse;">
    </a-camera>

    <a-entity
      light="type: directional; intensity: 0.85; castShadow: true; shadowMapHeight: 2048; shadowMapWidth: 2048;
        shadowCameraTop: 40; shadowCameraBottom: -40; shadowCameraRight: 40; shadowCameraLeft: -40; target: #camera"
      xrextras-attach="target: camera; offset: 8 15 4"
      position="1 4.3 2.5"
      shadow></a-entity>
    <a-light type="ambient" intensity="0.6"></a-light>

    <!-- 보물들이 추가될 컨테이너 -->
    <a-entity id="field"></a-entity>

    <!-- 탭 가능한 바닥 (그림자만 받음) -->
    <a-box id="ground" class="cantap" scale="1000 2 1000" position="0 -1 0"
      material="shader: shadow; transparent: true; opacity: 0.4" shadow></a-box>
  </a-scene>

  <!-- Engine binary: © Niantic Spatial, Inc. — XR Engine License (https://github.com/8thwall/engine/blob/main/LICENSE) -->
</body>
</html>
