<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Demo B — 방 탐험 보물찾기 AR</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; font-family: -apple-system, system-ui, sans-serif; background: #000; }
    /* 뒤에 깔리는 실시간 카메라 영상 */
    #cam {
      position: fixed; inset: 0; width: 100%; height: 100%;
      object-fit: cover; z-index: -1;
    }
    /* 중앙 조준점 (보고 있는 방향) */
    #reticle {
      position: fixed; top: 50%; left: 50%; width: 26px; height: 26px;
      transform: translate(-50%, -50%); z-index: 5; pointer-events: none;
      border: 2px solid rgba(255,255,255,.9); border-radius: 50%;
      box-shadow: 0 0 0 2px rgba(0,0,0,.4);
    }
    #reticle::after {
      content: ''; position: absolute; top: 50%; left: 50%; width: 4px; height: 4px;
      transform: translate(-50%,-50%); background: #FFD54F; border-radius: 50%;
    }
    #hud {
      position: fixed; top: 12px; left: 50%; transform: translateX(-50%); z-index: 10;
      background: rgba(0,0,0,.65); color: #fff; padding: 10px 16px;
      border-radius: 14px; font-size: 15px; text-align: center;
    }
    #hud b { color: #FFD54F; font-size: 20px; }
    #start {
      position: fixed; inset: 0; z-index: 20; border: none;
      background: linear-gradient(160deg,#1a237e,#4a148c); color: #fff;
      font-size: 19px; display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 14px; cursor: pointer;
    }
    #start span { font-size: 14px; opacity: .8; max-width: 280px; text-align: center; }
    #win {
      position: fixed; inset: 0; z-index: 30; display: none;
      background: rgba(0,0,0,.8); color: #fff; align-items: center; justify-content: center;
      flex-direction: column; gap: 10px; font-size: 26px;
    }
  </style>
</head>
<body>
  <video id="cam" autoplay playsinline muted></video>
  <div id="reticle"></div>
  <div id="hud">🔭 방을 둘러보며 보물을 찾으세요<br/>남은 보물: <b id="count">6</b></div>
  <button id="start">🚀 탭하여 시작<span>카메라와 자이로(기기 방향) 권한을 허용해주세요. 그 자리에서 몸을 돌려 360° 둘러봅니다.</span></button>
  <div id="win">🎉 모든 보물을 찾았어요!<div style="font-size:15px;opacity:.8">새로고침하면 다시 시작</div></div>

  <!-- 카메라 영상 위에 투명하게 얹히는 3D 씬 -->
  <a-scene
    renderer="alpha: true; colorManagement: true"
    background="transparent: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: true">

    <!-- 자이로(look-controls)로 둘러보는 카메라 + 중앙 시선 커서 -->
    <a-camera position="0 0 0" wasd-controls-enabled="false"
              look-controls="magicWindowTrackingEnabled: true; pointerLockEnabled: false; reverseMouseDrag: false">
      <!-- fuse: 0.8초 응시하면 자동 수집 -->
      <a-cursor fuse="true" fuse-timeout="800"
                raycaster="objects: .treasure"
                material="color: #FFD54F; shader: flat"
                geometry="primitive: ring; radiusInner: 0.012; radiusOuter: 0.02"></a-cursor>
    </a-camera>

    <a-entity id="treasures"></a-entity>
  </a-scene>

  <script>
    // ---- 카메라 영상 시작 (HTTPS/localhost 필요) ----
    const startBtn = document.getElementById('start');
    startBtn.addEventListener('click', async () => {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: 'environment' } }, audio: false
        });
        document.getElementById('cam').srcObject = stream;
        startBtn.style.display = 'none';
      } catch (e) {
        alert('카메라를 열 수 없습니다. HTTPS 주소에서 열렸는지, 권한을 허용했는지 확인하세요.\n' + e);
      }
    });

    // ---- 보물 6개를 내 주변 360°에 배치 ----
    const root = document.getElementById('treasures');
    const COLORS = ['#FFD54F', '#4FC3F7', '#81C784', '#FF8A65', '#BA68C8', '#F06292'];
    const TOTAL = 6;
    let remaining = TOTAL;

    for (let i = 0; i < TOTAL; i++) {
      const angle = (i / TOTAL) * Math.PI * 2;     // 수평으로 균등 분포
      const r = 4;                                  // 반경 4m
      const y = -0.6 + Math.random() * 1.8;         // 높이 약간씩 다르게
      const x = Math.sin(angle) * r;
      const z = -Math.cos(angle) * r;

      const t = document.createElement('a-entity');
      t.classList.add('treasure');
      t.setAttribute('position', `${x} ${y} ${z}`);
      // 빛나는 보물 상자(다면체) — 천천히 회전
      t.setAttribute('geometry', 'primitive: dodecahedron; radius: 0.45');
      t.setAttribute('material', `color: ${COLORS[i]}; emissive: ${COLORS[i]}; emissiveIntensity: 0.5; metalness: 0.3; roughness: 0.4`);
      t.setAttribute('animation__spin', 'property: rotation; to: 0 360 0; loop: true; dur: 4000; easing: linear');
      t.setAttribute('animation__bob', 'property: position; to: ' + `${x} ${y + 0.2} ${z}` + '; dir: alternate; loop: true; dur: 1500; easing: easeInOutSine');

      // 응시(fuse)로 click 이벤트 발생 시 수집
      t.addEventListener('click', () => {
        t.setAttribute('animation__collect', 'property: scale; to: 0 0 0; dur: 300; easing: easeInBack');
        setTimeout(() => t.parentNode && t.parentNode.removeChild(t), 320);
        remaining--;
        document.getElementById('count').textContent = remaining;
        if (remaining <= 0) document.getElementById('win').style.display = 'flex';
      });

      root.appendChild(t);
    }
  </script>
</body>
</html>
